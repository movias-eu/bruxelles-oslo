<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Settings</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 40px 20px; }
        .card { max-width: 600px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2em; margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9em; }
        input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; box-sizing: border-box; }
        button { margin-top: 12px; background: #1976d2; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        button:hover { background: #1565c0; }
        .saved { margin-top: 12px; color: #388e3c; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Settings</h1>
        <form method="post" action="/settings">
            <label for="wfs_url">WFS URL</label>
            <input type="text" id="wfs_url" name="wfs_url" value="{{ wfs_url }}">
            <button type="submit">Save</button>
        </form>
        {% if saved %}
        <p class="saved">Settings saved.</p>
        {% endif %}
    </div>
</body>
</html>
