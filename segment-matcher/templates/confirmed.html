<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Segment Assigned</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; padding: 60px 20px; background: #f5f5f5; }
        .card { background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #388e3c; margin-bottom: 12px; }
        p { color: #555; font-size: 1.1em; }
        .detail { margin-top: 8px; color: #888; font-size: 0.95em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Segment assigned</h1>
        <p><b>{{ name }}</b> &rarr; segment <b>{{ gid }}</b> ({{ lvl }})</p>
        <p class="detail">Result posted to callback URL.</p>
    </div>
</body>
</html>
