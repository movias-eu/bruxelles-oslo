# YARRRML mapping for bike_devices(.v2).json -> OSLO Verkeersmetingen RDF.
#
# Run (two steps -- the point geometry needs a WKT field derived first):
#   uv run preprocessing/preprocess_bike_devices.py ../data-samples/bike_devices.v2.json -o bike_devices_prepared.json
#   uv run rml_map.py rml-mappings/bike_devices.yml bike_devices_prepared.json -o bike_devices.ttl
#
# Works for BOTH the original file and the v2 file. v2 adds two top-level,
# OPTIONAL fields per feature:
#   * roadSegment: { line, start, end, offset }  (WKT strings + offset)
#   * measureDirection: an INSPIRE LinkDirectionValue code (e.g. bothDirections)
# When these are absent (original file), Morph-KGC silently skips the missing
# references: the bemonsterdObject / Rijrichting / Wegsegment nodes are still
# emitted but carry no direction or road geometry (acceptable -- empty shells on
# the old data; fully populated on v2).
#
# Data is fed in-memory (access "{data}"), mimicking an API response.
#
# Morph-KGC in-memory gotchas honoured below (verified):
#   * The point geometry WKT is pre-built by the preprocessor (geometry.wkt),
#     because morph cannot index coordinates[0]/[1] in a template in-memory.
#   * roadSegment.line/start/end are pre-built WKT strings, referenced directly
#     as plain dotted scalars (dotted access to a SCALAR works; array access
#     does not).
#   * Blank-node subject labels MUST NOT start with "$(" (parser bug) and MUST
#     NOT contain WKT (spaces/parens are illegal in a bnode label) -- so every
#     blank-node label is "<prefix>-$(properties.name)".

prefixes:
  loc:        http://example.org/id/measureLocation/
  verkeer:    https://data.vlaanderen.be/ns/verkeersmetingen#
  impl:       https://implementatie.data.vlaanderen.be/ns/verkeersmetingen-uitwisseling#
  dv-weg:     https://data.vlaanderen.be/ns/weg#
  dv-netwerk: https://data.vlaanderen.be/ns/netwerk#
  geo:        http://www.opengis.net/ont/geosparql#
  sf:         http://www.opengis.net/ont/sf#
  iso-sp:     http://def.isotc211.org/iso19156/2011/SamplingPoint#
  iso-mp:     http://def.isotc211.org/iso19103/2005/MeasureProfile#
  schema:     http://schema.org/
  cdt:        https://w3id.org/cdt/
  xsd:        http://www.w3.org/2001/XMLSchema#
  LinkDirectionValue:    http://inspire.ec.europa.eu/codelist/LinkDirectionValue/

mappings:
  # --- The measure location (Verkeersmeetpunt) ------------------------------
  device:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: loc:$(properties.name)
    po:
      - [a, verkeer:Verkeersmeetpunt~iri]
      # Point geometry as a sampling-point shape.
      - p: iso-sp:SF_SamplingPoint.shape
        o: { mapping: shape }
      # The sampled object: the directed road segment (v2 only -- empty on v1).
      - p: verkeer:bemonsterdObject
        o: { mapping: rijrichting }
      # Point reference on the network, at the offset position (v2 only).
      - p: impl:Verkeersmeetpunt.verkeersmeetpuntnetwerkreferentie
        o: { mapping: puntreferentie }

  # --- Point geometry: sf:Point + WKT (preprocessor-derived geometry.wkt) ----
  shape:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: shape-$(properties.name)~blanknode
    po:
      - [a, sf:Point~iri]
      - [geo:asWKT, $(geometry.wkt), geo:wktLiteral]

  # --- Sampled object: Rijrichting (direction) -------------------------------
  # measureDirection (e.g. "bothDirections") -> LinkDirectionValue IRI.
  # On the original file (no measureDirection / roadSegment) this node is emitted
  # but empty.
  rijrichting:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: rijrichting-$(properties.name)~blanknode
    po:
      - [a, dv-weg:Rijrichting~iri]
      - [dv-weg:rijrichting, LinkDirectionValue:$(measureDirection)~iri]
      - p: impl:Rijrichting.netwerkreferentieelement
        o: { mapping: wegsegment }

  # --- The road segment (Wegsegment) with its line + begin/end nodes ---------
  wegsegment:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: wegsegment-$(properties.name)~blanknode
    po:
      - [a, dv-weg:Wegsegment~iri]
      - p: dv-netwerk:Link.geometriemiddellijn
        o: { mapping: segmentLine }
      - p: dv-netwerk:beginknoop
        o: { mapping: beginknoop }
      - p: dv-netwerk:eindknoop
        o: { mapping: eindknoop }

  segmentLine:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: segmentline-$(properties.name)~blanknode
    po:
      - [a, sf:LineString~iri]
      - [geo:asWKT, $(roadSegment.line), geo:wktLiteral]

  beginknoop:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: beginknoop-$(properties.name)~blanknode
    po:
      - [a, dv-netwerk:Knoop~iri]
      - p: dv-netwerk:Knoop.geometrie
        o: { mapping: beginknoopGeom }

  beginknoopGeom:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: beginknoopgeom-$(properties.name)~blanknode
    po:
      - [a, sf:Point~iri]
      - [geo:asWKT, $(roadSegment.start), geo:wktLiteral]

  eindknoop:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: eindknoop-$(properties.name)~blanknode
    po:
      - [a, dv-netwerk:Knoop~iri]
      - p: dv-netwerk:Knoop.geometrie
        o: { mapping: eindknoopGeom }

  eindknoopGeom:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: eindknoopgeom-$(properties.name)~blanknode
    po:
      - [a, sf:Point~iri]
      - [geo:asWKT, $(roadSegment.end), geo:wktLiteral]

  # --- Point reference on the network, at the offset position ----------------
  puntreferentie:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: puntref-$(properties.name)~blanknode
    po:
      - [a, dv-netwerk:Puntreferentie~iri]
      - p: dv-netwerk:Puntreferentie.opPositie
        o: { mapping: opPositie }

  opPositie:
    sources:
      - access: "{data}"
        referenceFormulation: jsonpath
        iterator: "$.features[*]"
    s: oppositie-$(properties.name)~blanknode
    po:
      - [a, iso-mp:Length~iri]
      - [schema:unitCode, "m", cdt:ucumunit]
      - [schema:value, $(roadSegment.offset), xsd:double]
